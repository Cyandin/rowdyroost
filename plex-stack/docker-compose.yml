services:
  gluetun:
    image: qmcgaw/gluetun@sha256:b0ee2135e6ba52ad3f102aae9663707cd1c9531485117067a380d3b2b6dd991d
    container_name: vpn
    cap_add:
      - NET_ADMIN
    environment:
      - TZ=America/Chicago
      - VPN_SERVICE_PROVIDER=surfshark
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=10.14.0.2/16
      - SERVER_COUNTRIES=Mexico
      - FIREWALL_OUTBOUND_SUBNETS=192.168.0.0/16,10.0.0.0/8
      - DOT=off
      - DNS_ADDRESS=9.9.9.9
      - HEALTH_SERVER_ADDRESS=0.0.0.0:9999
    ports:
      - "8080:8080" # qBittorrent Web UI
      - "9999:9999" # Gluetun health endpoint
    volumes:
      - /Users/costagalazios/docker/appdata/gluetun:/gluetun
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest@sha256:b024436f8ca665d16d9a997d26fd27fdf867ee5566ba09f32764e7b2976d3e02
    container_name: qbittorrent
    network_mode: container:vpn
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
      - WEBUI_PORT=8080
    volumes:
      - /Users/costagalazios/docker/appdata/qbittorrent:/config
      - /Users/costagalazios/media:/media
    restart: unless-stopped
    depends_on:
      - gluetun

  plex:
    image: lscr.io/linuxserver/plex:latest@sha256:59c671e182563040092a2d0901e429dc15e0aba9883acd13ef97857372b79b21
    container_name: plex
    ports:
      - "32400:32400"
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
      - VERSION=docker
    volumes:
      - /Users/costagalazios/docker/appdata/plex:/config
      - /Users/costagalazios/media:/media
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest@sha256:2b2c1c05eb3f648d2c80dfab9486147dd7bb0ad4d77fa972fc1c5de8f1da3738
    container_name: radarr
    ports:
      - "7878:7878"
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
    volumes:
      - /Users/costagalazios/docker/appdata/radarr:/config
      - /Users/costagalazios/media:/media
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest@sha256:4b025354d338999e03bf6dbdadcdde94815d39d4a5aba5de3cdc86a56d7d6c51
    container_name: sonarr
    ports:
      - "8989:8989"
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
    volumes:
      - /Users/costagalazios/docker/appdata/sonarr:/config
      - /Users/costagalazios/media:/media
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest@sha256:4fd7a166c8f46dd3370a871c250ee577d6c2ae97a0dbe0e3614b5ef736205620
    container_name: prowlarr
    ports:
      - "9696:9696"
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
    volumes:
      - /Users/costagalazios/docker/appdata/prowlarr:/config
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest@sha256:139dfee1c6f89249c8d665d1333a42e8ec74ec0a86bc6bb1c8461e10d3a66a47
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=America/Chicago
    ports:
      - "8191:8191"
    restart: unless-stopped
