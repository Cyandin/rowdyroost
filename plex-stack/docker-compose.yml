services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: vpn
    cap_add:
      - NET_ADMIN
    environment:
      - TZ=America/Chicago
      - VPN_SERVICE_PROVIDER=surfshark
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=10.14.0.2/16
      - SERVER_COUNTRIES=Mexico
      - FIREWALL_OUTBOUND_SUBNETS=192.168.0.0/16,10.0.0.0/8
      - DOT=off
      - DNS_ADDRESS=9.9.9.9
      - HEALTH_SERVER_ADDRESS=0.0.0.0:9999
    ports:
      - "8080:8080" # qBittorrent Web UI
      - "9999:9999" # Gluetun health endpoint
    volumes:
      - /Users/costagalazios/docker/appdata/gluetun:/gluetun
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: container:vpn
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
      - WEBUI_PORT=8080
    volumes:
      - /Users/costagalazios/docker/appdata/qbittorrent:/config
      - /Users/costagalazios/media:/media
    restart: unless-stopped
    depends_on:
      - gluetun

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    ports:
      - "32400:32400"
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
      - VERSION=docker
    volumes:
      - /Users/costagalazios/docker/appdata/plex:/config
      - /Users/costagalazios/media:/media
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    ports:
      - "7878:7878"
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
    volumes:
      - /Users/costagalazios/docker/appdata/radarr:/config
      - /Users/costagalazios/media:/media
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    ports:
      - "8989:8989"
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
    volumes:
      - /Users/costagalazios/docker/appdata/sonarr:/config
      - /Users/costagalazios/media:/media
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    ports:
      - "9696:9696"
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
    volumes:
      - /Users/costagalazios/docker/appdata/prowlarr:/config
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=America/Chicago
    ports:
      - "8191:8191"
    restart: unless-stopped
