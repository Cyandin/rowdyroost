<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Gorillas | Rowdy Roost Arcade</title>

  <link rel="stylesheet"
        href="https://v8.js-dos.com/latest/js-dos.css">

  <script src="https://v8.js-dos.com/latest/js-dos.js"></script>

  <style>
    html, body, #dos {
      width: 100%;
      height: 100%;
      margin: 0;
      background: black;
      overflow: hidden;
    }
  </style>
</head>

<body>

<div id="dos"></div>

<script>
(async () => {
  const response = await fetch("games/gorilla.exe");

  if (!response.ok) {
    throw new Error(
      `Failed to load gorilla.exe: ${response.status}`
    );
  }

  const gorillaExe = new Uint8Array(
    await response.arrayBuffer()
  );

  Dos(document.getElementById("dos"), {
    dosboxConf: `
[autoexec]
mount c .
c:
gorilla.exe
`,
    initFs: [
      {
        path: "gorilla.exe",
        contents: gorillaExe
      }
    ],
    autoStart: true
  });
})();
</script>

</body>
</html>
